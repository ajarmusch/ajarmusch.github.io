name: Sync Notion data

on:
  # Daily at 06:00 UTC (~01:00 ET) — runs before the typical workday so site is fresh
  schedule:
    - cron: "0 6 * * *"
  # Manual trigger from the Actions tab
  workflow_dispatch:
  # Also run when the fetch script itself changes, to validate it
  push:
    paths:
      - "scripts/fetch_notion.py"
      - ".github/workflows/notion-sync.yml"

permissions:
  contents: write  # needed to commit JSON updates
  actions: write   # needed to trigger deploy.yml after a sync that changes data

concurrency:
  group: notion-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Use PAT-less GITHUB_TOKEN; default fetch-depth=1 is fine because we only commit a diff
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: scripts/requirements.txt

      - name: Install Python deps (stdlib only — placeholder)
        run: |
          if [ -s scripts/requirements.txt ]; then
            pip install -r scripts/requirements.txt
          fi

      - name: Verify Notion token is set
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
        run: |
          if [ -z "$NOTION_TOKEN" ]; then
            echo "::error::NOTION_TOKEN secret is not set. See scripts/README.md for setup."
            exit 1
          fi
          echo "Token present (length: ${#NOTION_TOKEN})"

      - name: Fetch Notion data → src/data/*.json
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
        run: |
          python3 scripts/fetch_notion.py --output-dir src/data --pretty

      - name: Show diff (summary)
        run: |
          git diff --stat src/data/ || true

      - name: Commit & push if changed
        id: commit
        run: |
          if [ -z "$(git status --porcelain src/data/)" ]; then
            echo "No changes to commit."
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/data/
          git commit -m "chore(data): sync Notion → src/data" -m "Triggered by ${{ github.event_name }} at $(date -u +%FT%TZ)"
          git push
          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Trigger site rebuild (deploy.yml)
        if: steps.commit.outputs.changed == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'deploy.yml',
              ref: 'main',
            });
            core.info('Dispatched deploy.yml to rebuild site with fresh Notion data.');

      - name: Upload JSON as artifact (for debugging failed builds)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: notion-data-${{ github.run_id }}
          path: src/data/*.json
          retention-days: 14
